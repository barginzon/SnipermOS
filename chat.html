<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #121212; color: #e5e7eb; margin: 0; overflow: hidden; }
        .chat-container { height: calc(100vh - 80px); overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .message-bubble { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 14px; margin-bottom: 5px; }
        .sent { background-color: #3498db; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background-color: #262626; color: #e5e7eb; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
    <div id="chat-box" class="chat-container"></div>
    <div class="p-3 bg-[#161616] flex gap-2 border-t border-gray-800">
        <input id="chat-input" type="text" placeholder="Mesajını yaz..." class="flex-1 bg-[#1a1a1a] border border-gray-700 rounded-lg p-2 text-sm text-white outline-none">
        <button onclick="sendMessage()" class="bg-blue-600 w-10 h-10 rounded-lg flex items-center justify-center active:scale-90 transition-transform">
            <i class="fa-solid fa-paper-plane text-xs"></i>
        </button>
    </div>

    <script>
        const SUPABASE_URL = "https://pplwiflvdzcjiclpqpkj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_bRfLSdOtMi2Cz3DiSBRHmQ_w6qQeOli";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MY_ID = "5425415086"; // Senin ID'n
        const PARTNER_ID = "5306034200"; // Filiz'in ID'si

        async function fetchMessages() {
            const { data } = await _supabase.from('messages').select('*')
                .or(`and(sender_id.eq.${MY_ID},room_id.eq.${PARTNER_ID}),and(sender_id.eq.${PARTNER_ID},room_id.eq.${MY_ID})`)
                .order('created_at', { ascending: true });
            
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = data.map(msg => {
                const isMe = msg.sender_id === MY_ID;
                return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} w-full">
                    <div class="message-bubble ${isMe ? 'sent' : 'received'}">${msg.text}</div>
                </div>`;
            }).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            await _supabase.from('messages').insert([{ sender_name: 'Efe Can', sender_id: MY_ID, room_id: PARTNER_ID, text: text }]);
            input.value = '';
            fetchMessages();
        }

        _supabase.channel('chat_sync').on('postgres_changes', { event: '*', schema: 'public' }, () => fetchMessages()).subscribe();
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        fetchMessages();
    </script>
</body>
</html>
